name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -scheme DockerSwiftUI \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y DockerSwiftUI.zip DockerSwiftUI.app

      - name: Attest artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/Build/Products/Release/DockerSwiftUI.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/Build/Products/Release/DockerSwiftUI.zip
