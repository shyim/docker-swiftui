name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal binary
        run: |
          xcodebuild -scheme Dockable \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.version }}" \
            build

      - name: Verify universal binary
        run: lipo -info build/Build/Products/Release/Dockable.app/Contents/MacOS/Dockable

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y Dockable.zip Dockable.app

      - name: Attest artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/Build/Products/Release/Dockable.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/Build/Products/Release/Dockable.zip
