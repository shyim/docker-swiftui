name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -scheme DockerSwiftUI \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y DockerSwiftUI.zip DockerSwiftUI.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DockerSwiftUI
          path: build/Build/Products/Release/DockerSwiftUI.zip
