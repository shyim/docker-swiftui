name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          xcodebuild -scheme Dockable \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify universal binary
        run: lipo -info build/Build/Products/Release/Dockable.app/Contents/MacOS/Dockable

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r -y Dockable.zip Dockable.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dockable
          path: build/Build/Products/Release/Dockable.zip
